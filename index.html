<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pizzería Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; display: flex; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .menu { flex: 2; }
        .pedido { flex: 1; min-width: 300px; border-left: 5px solid #ff9800; }
        
        .grid-toppings { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 15px; margin-top: 20px;
        }
        
        .card {
            border: 2px solid #eee; padding: 15px; border-radius: 10px; text-align: center;
            cursor: pointer; transition: 0.3s;
        }
        .card:hover { border-color: #ff9800; background: #fffdfa; transform: translateY(-3px); }
        .card span { font-size: 2.5rem; display: block; margin-bottom: 5px; }

        .item-pedido { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .btn-ordenar { padding: 20px; font-size: 1.2rem; cursor: pointer; width: 100%; background: #ff9800; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        .input-nombre { width: 100%; padding: 10px; margin-top: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }

        @media (max-width: 600px) {
            body { flex-direction: column !important; padding: 10px; overflow-x: hidden; width: 100vw; }
            .panel { width: 100% !important; max-width: 100%; margin-bottom: 20px; box-sizing: border-box; }
            .pedido { border-left: none; border-top: 5px solid #ff9800; min-width: unset; }
        }
    </style>
</head>
<body>

    <div class="panel menu">
        <h2>🍕 Haz tu Pedido de Pizzas (Desde tu Hogar!!!)</h2>
        <div id="contenedorMenu" class="grid-toppings">Cargando ingredientes...</div>
    </div>

    <div class="panel pedido">
        <h2>🛒 Tu Pedido</h2>
        <div id="listaPedido"></div>
        <hr>
        
        <input type="text" id="nombreCliente" class="input-nombre" placeholder="¿A nombre de quién?">
        <input type="text" id="telefonoCliente" class="input-nombre" placeholder="Teléfono (0412, 0424, 0414...)">
        <input type="text" id="direccion" class="input-nombre" placeholder="Dirección exacta..." required>

        <button type="button" onclick="obtenerGPS()" style="background: #3498db; color: white; border: none; padding: 12px; border-radius: 5px; margin-top: 10px; cursor: pointer; width: 100%; font-weight: bold;">
            📍 O usa mi ubicación exacta (GPS)
        </button>

        <h3>Total: $<span id="totalTxt">0.00</span></h3>
        <div id="seccion-pago" style="text-align: center; border: 1px solid #ccc; padding: 15px; border-radius: 10px; margin-top: 20px;">
            <h3>💸 Pago Móvil</h3>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PAGO-MOVIL:0102:04126327294:V6544393" alt="QR Pago Móvil">
            <div style="background: #f9f9f9; padding: 10px; margin: 10px 0; font-size: 0.9em;">
                <strong>Banco:</strong> BDV (0102)<br>
                <strong>Teléfono:</strong> 0412-6327294<br>
                <strong>Cédula:</strong> V-6.544.393
            </div>
            <input type="number" id="referencia" placeholder="Últimos 6 dígitos de referencia" required style="width: 80%; padding: 10px; margin-bottom: 10px;">
        </div>
        <button class="btn-ordenar" onclick="confirmarPedido()">Enviar Pedido a Cocina</button>

<div class="redes-container" style="margin-top: 30px; text-align: center; border-top: 2px solid #eee; padding-top: 20px;">
    <p style="font-size: 1rem; font-weight: bold; color: #444; margin-bottom: 15px;">¡Síguenos y etiqueta tu pizza! 🍕</p>
    <div style="display: flex; justify-content: center; gap: 25px; align-items: center;">

        <a href="https://instagram.com/tu_pizzeria" target="_blank" style="text-decoration: none;">

                        <stop offset="0%" stop-color="#fd5"/>
                        <stop offset="25%" stop-color="#ff543f"/>
                        <stop offset="60%" stop-color="#c837ab"/>
                        <stop offset="100%" stop-color="#3770f5"/>

                </defs>

            </svg>
        </a>

            </svg>
        </a>

    </div>
</div>       
    </div>
    <script>
    const SUPABASE_URL = 'https://hjwfmexfahcqsiqnsxpd.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_mH6jx0dJyPpbxIGyvWlP4g_5o8NlOmJ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); 
    let pedido = [];

    async function obtenerIngredientes() {
        const { data, error } = await supabaseClient.from('toppings').select('*');
        if (error) return console.error("Error:", error);
        if (data) dibujarMenu(data);
    }

    function dibujarMenu(ingredientes) {
        const contenedor = document.getElementById('contenedorMenu');
        contenedor.innerHTML = ""; 
        ingredientes.forEach(ing => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<span>${ing.icono || '🍕'}</span><strong>${ing.nombre}</strong><br>$${Number(ing.precio).toFixed(2)}`;
            div.onclick = () => agregarAlPedido(ing);
            contenedor.appendChild(div);
        });
    }

    function agregarAlPedido(ingrediente) {
        pedido.push(ingrediente);
        actualizarInterfaz();
    }

    function actualizarInterfaz() {
        const lista = document.getElementById('listaPedido');
        const totalSpan = document.getElementById('totalTxt');
        lista.innerHTML = "";
        let total = 0;
        pedido.forEach((item, index) => {
            total += Number(item.precio);
            lista.innerHTML += `
                <div class="item-pedido">
                    <span>${item.icono || '🍕'} ${item.nombre}</span>
                    <span>$${Number(item.precio).toFixed(2)} <button onclick="quitar(${index})">❌</button></span>
                </div>`;
        });
        totalSpan.innerText = total.toFixed(2);
    }

    function quitar(index) {
        pedido.splice(index, 1);
        actualizarInterfaz();
    }

    // --- AQUÍ ESTÁ LA FUNCIÓN EVOLUCIONADA QUE INTEGRA LA TABLA INTERMEDIA ---
async function confirmarPedido() {
    const nombre = document.getElementById('nombreCliente').value.trim();
    const telefono = document.getElementById('telefonoCliente').value.trim(); 
    const direccion = document.getElementById('direccion').value.trim();
    const referencia = String(document.getElementById('referencia').value).trim();
    
    // 1. Aseguramos que el contenido sea un String limpio
  //  const contenido = pedido.map(p => `${p.cantidad}x ${p.nombre}`).join(", ");
// Cambia la línea del contenido por esta:
    // const contenido = pedido.map(p => {
    //     // Si p.cantidad existe, úsala; si no, asume que es 1
    //     const cant = p.cantidad || 1; 
    //     return `${cant}x ${p.nombre}`;
    // }).join(", ");
    //const contenido = pedido.map(p => p.nombre).join(", ");  
// Esta versión limpia cualquier "número + x" que aparezca al inicio
const contenido = pedido.map(p => {
    // Usamos replace con una expresión regular para quitar el "1x ", "2x ", etc.
    // Si no tiene el "1x", el nombre se queda igualito.
    return p.nombre.replace(/^\d+x\s*/, ""); 
}).join(", ");        
    const bancoEmisor = "No especificado";
    
    if (!nombre || !telefono || !direccion || !referencia) {
        return alert("Por favor, llena todos los campos.");
    }

    // 2. Generamos el ID (Asegúrate que en Supabase la columna ID sea BIGINT / int8)
    const pedidoIdManual = Date.now(); 

    // 3. Redondeamos el total a 2 decimales para que el 'numeric' no sufra
    const precioTotal = pedido.reduce((sum, ing) => sum + Number(ing.precio), 0);
    const totalFinal = parseFloat(precioTotal.toFixed(2));

    try {
        const { error: errorPedido } = await supabaseClient
            .from('pedidos')
            .insert([{ 
                id: pedidoIdManual,
                contenido: contenido,
                nombre: nombre,
                telefono: telefono, 
                total: totalFinal, 
                direccion: direccion,
                referencia: referencia,
                banco_emisor: bancoEmisor,
                metodo_pago: 'Pago Movil',
                estado: 'pendiente'
            }]);

        if (errorPedido) {
            console.error("Error en tabla pedidos:", errorPedido);
            throw errorPedido;
        }

        const detalles = pedido.map(ing => ({
            pedido_id: pedidoIdManual,
            topping_id: ing.id,
            cantidad: 1,
            precio_unitario: parseFloat(Number(ing.precio).toFixed(2))
        }));

        const { error: errorDetalle } = await supabaseClient
            .from('pedido_detalles')
            .insert(detalles);

        if (errorDetalle) {
            console.error("Error en tabla detalles:", errorDetalle);
            throw errorDetalle;
        }

        // --- BLOQUE DE LIMPIEZA INTEGRADO ---
        alert("¡Pedido enviado con éxito! 🍕 Pagado y listo para cocina.");

        // Limpiamos los inputs del formulario
        document.getElementById('nombreCliente').value = "";
        document.getElementById('telefonoCliente').value = "";
        document.getElementById('direccion').value = "";
        document.getElementById('referencia').value = "";

        // Vaciamos el carrito de compras (el arreglo)
        pedido = [];

        // Refrescamos la interfaz (el carrito visual en la derecha)
        // Nota: Asegúrate de que esta sea la función que usas para dibujar tu carrito
        if (typeof actualizarInterfaz === 'function') {
            actualizarInterfaz();
        } else if (typeof mostrarPedido === 'function') {
            mostrarPedido();
        }
        // -------------------------------------

    } catch (error) {
        console.error("Error detectado completo:", error);
        alert("Error: " + error.message);
    }
}

    function obtenerGPS() {
        if (navigator.geolocation) {
            const direccionInput = document.getElementById('direccion');
            direccionInput.value = "Buscando satélites... 🛰️";
            navigator.geolocation.getCurrentPosition(function(posicion) {
                const lat = posicion.coords.latitude;
                const lon = posicion.coords.longitude;
                direccionInput.value = `https://www.google.com/maps?q=${lat},${lon}`;
                alert("🎯 Ubicación capturada.");
            }, function() {
                direccionInput.value = "";
                alert("Error al obtener GPS.");
            }, { enableHighAccuracy: true });
        }
    }

    obtenerIngredientes();
    </script>
</body>
</html>
