<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Cocina Protegido 🍕</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark-blue: #1a2a3a; --orange: #ff9800; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark-blue); color: var(--white); margin: 0; padding: 20px; }
        
        /* Estilos del Login */
        #login-container { max-width: 400px; margin: 100px auto; background: var(--white); padding: 30px; border-radius: 8px; color: #333; }
        #login-container h2 { text-align: center; color: var(--dark-blue); }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Estilos del Panel (Oculto al inicio) */
        #panel-cocina { display: none; }
        header { display: flex; align-items: center; border-bottom: 2px solid var(--orange); padding-bottom: 10px; margin-bottom: 20px; justify-content: space-between; }
        
        #contenedor-pedidos { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card-pedido { background-color: var(--white); color: #333; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-left: 8px solid var(--orange); }
        .card-header { background-color: #f4f4f4; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 15px; }
        .btn-despachar { background-color: #28a745; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<!-- SECCIÓN 1: FORMULARIO DE LOGIN -->
<div id="login-container">
    <h2><i class="fas fa-pizza-slice"></i> Acceso Cocina</h2>
    <div class="input-group">
        <input type="email" id="email" placeholder="Correo electrónico" required>
    </div>
    <div class="input-group">
        <input type="password" id="pass" placeholder="Contraseña" required>
    </div>
    <button onclick="login()" class="btn-despachar">ENTRAR</button>
</div>

<!-- SECCIÓN 2: PANEL DE PEDIDOS (Se muestra tras el login) -->
<div id="panel-cocina">
    <header>
        <div style="display: flex; align-items: center;">
            <img src="https://cdn-icons-png.flaticon.com/512/3595/3595455.png" width="40" style="margin-right: 15px;">
            <h1>Pedidos Pendientes</h1>
        </div>
        <button onclick="logout()" style="background:none; border:1px solid white; color:white; cursor:pointer; padding:5px 10px;">Salir</button>
    </header>

    <div id="contenedor-pedidos">
        <p style="text-align: center; grid-column: 1/-1;">Cargando pedidos... 🍕</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://hjwfmexfahcqsiqnsxpd.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_mH6jx0dJyPpbxIGyvWlP4g_5o8NlOmJ'; // Tu anon key
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // FUNCIÓN DE LOGIN
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;

        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            alert("Error de acceso: " + error.message);
        } else {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('panel-cocina').style.display = 'block';
            cargarDatos();
        }
    }

    // CARGAR DATOS (Ahora con permisos de 'authenticated')
async function cargarDatos() {
    console.log("Consultando pedidos...");
    
    const { data, error } = await supabaseClient
        .from('pedidos')
        .select('id, nombre, direccion, telefono, estado, contenido') // 'contenido' está aquí mismo
        .eq('estado', 'pendiente');

    if (error) {
        console.error("Error en Supabase:", error);
        return;
    }

    mostrarPedidos(data);
}

function mostrarPedidos(pedidos) {
    const contenedor = document.getElementById('contenedor-pedidos');
    contenedor.innerHTML = ''; 

    if (!pedidos || pedidos.length === 0) {
        contenedor.innerHTML = '<p style="grid-column:1/-1; text-align:center;">No hay pedidos pendientes 🍕</p>';
        return;
    }

    pedidos.forEach(pedido => {
        // Enlaces dinámicos
        const linkMaps = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(pedido.direccion)}`;
        const linkTel = `tel:${pedido.telefono}`;

        contenedor.innerHTML += `
            <div class="card-pedido" style="background: white; color: #333; border-radius: 12px; margin-bottom: 15px; border-left: 10px solid #ff9800; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                <div class="card-header" style="padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="margin: 0; color: #1a2a3a;"><i class="fas fa-user"></i> ${pedido.nombre}</h3>
                    <span style="background: #1a2a3a; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8em;">#${pedido.id}</span>
                </div>
                
                <div class="card-body" style="padding: 15px;">
                    <p style="margin: 0 0 5px 0; font-weight: bold; color: #ff9800;">Ingredientes:</p>
                    <!-- Aquí mostramos el contenido directamente de la tabla pedidos -->
                    <p style="margin: 0 0 15px 0; font-size: 1.1em; line-height: 1.4;">
                        <i class="fas fa-pizza-slice" style="color: #ff9800;"></i> ${pedido.contenido || 'Sin descripción'}
                    </p>
                    
                    <div style="border-top: 1px solid #eee; padding-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <a href="${linkMaps}" target="_blank" style="text-decoration: none; color: #007bff; font-weight: bold; font-size: 0.9em; display: flex; align-items: center; gap: 5px;">
                            <i class="fas fa-map-marker-alt"></i> UBICACIÓN GPS
                        </a>
                        <a href="${linkTel}" style="text-decoration: none; color: #28a745; font-weight: bold; font-size: 0.9em; display: flex; align-items: center; gap: 5px;">
                            <i class="fas fa-phone"></i> LLAMAR CLIENTE
                        </a>
                    </div>
                </div>

                <div class="card-footer" style="padding: 10px; background: #f9f9f9; border-radius: 0 0 12px 12px;">
                    <button onclick="despacharPedido(${pedido.id})" style="width: 100%; background: #28a745; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase;">
                        Despachar Pedido <i class="fas fa-check"></i>
                    </button>
                </div>
            </div>`;
    });
}

// FUNCIÓN CORREGIDA: Ahora pone el estado como 'despachado'
async function despacharPedido(id) {
    const { error } = await supabaseClient
        .from('pedidos')
        .update({ estado: 'despachado' }) // 'despachado' es lo que espera el motorizado
        .eq('id', id);

    if (error) {
        alert("Error al despachar: " + error.message);
    } else {
        alert("¡Pedido enviado al motorizado! 🛵");
        cargarDatos(); // Recarga la lista para quitar el que acabas de despachar
    }
}

    async function logout() {
        await supabaseClient.auth.signOut();
        location.reload();
    }
</script>
</body>
</html>
